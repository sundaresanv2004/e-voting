<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to E-Voting</title>
    <style>
        body,
        table,
        td,
        a {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }

        table,
        td {
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }

        img {
            -ms-interpolation-mode: bicubic;
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
        }

        body {
            height: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
    </style>
</head>

<body style="background-color: #f4f4f5; margin: 0; padding: 0;">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"
        style="background-color: #f4f4f5;">
        <tr>
            <td style="padding: 40px 20px;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"
                    style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">

                    <!-- Success Icon -->
                    <tr>
                        <td style="padding: 40px 40px 0 40px; text-align: center;">
                            <div
                                style="display: inline-block; background: linear-gradient(135deg, #10b981 0%, #059669 100%); padding: 16px; border-radius: 50%; margin-bottom: 24px;">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M9 12L11 14L15 10M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z"
                                        stroke="white" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                </svg>
                            </div>
                        </td>
                    </tr>

                    <!-- Title -->
                    <tr>
                        <td style="padding: 0 40px 16px 40px; text-align: center;">
                            <h1 style="margin: 0; font-size: 28px; font-weight: 700; color: #18181b; line-height: 1.2;">
                                Welcome to E-Voting! 🎉
                            </h1>
                        </td>
                    </tr>

                    <!-- Description -->
                    <tr>
                        <td style="padding: 0 40px 32px 40px; text-align: center;">
                            <p style="margin: 0; font-size: 16px; color: #71717a; line-height: 1.6;">
                                Your email has been verified successfully. You can now participate in elections and make
                                your voice heard!
                            </p>
                        </td>
                    </tr>

                    <!-- CTA Button -->
                    <tr>
                        <td style="padding: 0 40px 32px 40px; text-align: center;">
                            <a href="{{ .SiteURL }}/auth/login" style="display: inline-block; 
                                      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); 
                                      color: #ffffff; 
                                      font-size: 16px; 
                                      font-weight: 600; 
                                      text-decoration: none; 
                                      padding: 14px 32px; 
                                      border-radius: 8px;">
                                Go to Dashboard
                            </a>
                        </td>
                    </tr>

                    <!-- Features -->
                    <tr>
                        <td style="padding: 0 40px 32px 40px;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <td style="padding-bottom: 16px;">
                                        <h3
                                            style="margin: 0 0 16px 0; font-size: 18px; font-weight: 600; color: #18181b;">
                                            What you can do now:
                                        </h3>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 12px 0; border-top: 1px solid #e4e4e7;">
                                        <p style="margin: 0; font-size: 14px; color: #3f3f46; font-weight: 500;">✓ Vote
                                            in active elections</p>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 12px 0; border-top: 1px solid #e4e4e7;">
                                        <p style="margin: 0; font-size: 14px; color: #3f3f46; font-weight: 500;">✓ View
                                            election results</p>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 12px 0; border-top: 1px solid #e4e4e7;">
                                        <p style="margin: 0; font-size: 14px; color: #3f3f46; font-weight: 500;">✓
                                            Manage your profile</p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                </table>

                <!-- Footer -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"
                    style="max-width: 600px; margin: 24px auto 0;">
                    <tr>
                        <td style="text-align: center; padding: 0 20px;">
                            <p style="margin: 0; font-size: 13px; color: #a1a1aa; line-height: 1.5;">
                                Need help? Contact us at <a href="mailto:support@e-voting.com"
                                    style="color: #6366f1; text-decoration: none;">support@e-voting.com</a>
                            </p>
                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>
</body>

</html>
