services:
  web:
    container_name: e-voting-app
    # Local development: reads from .env file
    # Production: environment variables are injected by the hosting platform
    # NOTE: Remove or comment out 'env_file' in production if the platform doesn't support .env files
    env_file:
      - path: .env
        required: false # Makes .env optional - won't fail if file doesn't exist
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time variables (embedded in client bundle)
        # These MUST be set as environment variables before running docker compose
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY}
    ports:
      - "${PORT:-3000}:3000" # Allow custom port via PORT env var, default to 3000
    environment:
      # Runtime environment variables
      - NODE_ENV=${NODE_ENV:-production}
      # Public variables (embedded in client bundle)
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY}
      # Server-side only variables (optional - only needed for admin operations)
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health", "||", "exit", "1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
